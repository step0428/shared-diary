<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>久刹</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="久刹">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230a0a12' width='100' height='100' rx='20'/><text y='65' x='50' text-anchor='middle' font-size='50' fill='%2364b4ff'>久</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 视图切换平滑过渡动画 (类似 iOS App 的微缩放淡入) */
    .view-enter {
      animation: viewFadeSlide 0.35s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
    @keyframes viewFadeSlide {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    /* 所有模态框弹窗的丝滑滑出动画 */
    .modal:not(.hidden) .modal-backdrop {
      animation: fadeIn 0.3s ease forwards;
    }
    .modal:not(.hidden) .modal-content {
      animation: modalFadeSlideUp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
    @keyframes modalFadeSlideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* 心情选项交互样式 */
    .mood-option { opacity: 0.4; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); display: inline-block; }
    .mood-option:hover { opacity: 0.8; transform: scale(1.1); }
    .mood-option.selected { opacity: 1; transform: scale(1.3); }
    
    /* 让日历的默认背景色完美融入当前主题 */
    .fc {
      --fc-page-bg-color: var(--bg-primary);
      --fc-neutral-bg-color: var(--bg-tertiary);
    }
    /* 专门修复周/日视图左上角空白格的背景色 */
    .fc .fc-timegrid-axis,
    .fc .fc-timegrid-axis-cushion {
      background-color: var(--bg-primary) !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 加载页 -->
    <div class="loading" id="loading">
      <div class="loading-ring"></div>
    </div>

    <!-- 登录/注册页 -->
    <div class="auth-page view-enter" id="authPage">
      <!-- 电影级视频背景 -->
      <video autoplay loop muted playsinline class="auth-bg-video">
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4" type="video/mp4">
      </video>
      <div class="auth-bg-overlay"></div>
      
      <div class="auth-box liquid-glass">
        <h1 class="auth-title">Jiu Sha</h1>
        <p class="auth-subtitle">记录在一起的每一天</p>
        <div class="auth-tabs liquid-glass" style="border-radius: 9999px;">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <form class="auth-form" id="authForm">
          <label for="email" class="sr-only">邮箱</label>
          <input type="email" id="email" placeholder="邮箱" required>
          <label for="displayName" class="sr-only">昵称</label>
          <input type="text" id="displayName" class="hidden" placeholder="昵称">
          <label for="password" class="sr-only">密码</label>
          <input type="password" id="password" placeholder="密码" required>
          <label for="confirmPassword" class="sr-only">确认密码</label>
          <input type="password" id="confirmPassword" class="hidden" placeholder="确认密码">
          <button type="submit" class="auth-btn liquid-glass-strong" id="authBtn">登录</button>
        </form>
        <p class="auth-error" id="authError"></p>
        <p class="auth-link" id="forgotPasswordLink" style="display:none;cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;margin-top:15px;transition:color 0.3s;">忘记密码？</p>
      </div>
    </div>

    <!-- 主应用 -->
    <div class="main-app hidden sidebar-collapsed" id="mainApp">
      <!-- 粒子特效 -->
      <canvas id="particles" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>
      <!-- 庆祝特效画布 -->
      <canvas id="celebrationCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:none;"></canvas>
      <!-- 左侧朋友栏 -->
      <aside class="friend-sidebar" id="friendSidebar">
        <div class="friend-sidebar-header">记录</div>
        <div class="friend-item active" data-filter="mine">我的记录</div>
        <div class="friend-divider">朋友</div>
        <div id="friendList"></div>
      </aside>
      <!-- 顶部导航 -->
      <header class="header">
        <div class="header-left">
          <button class="icon-btn toggle-sidebar-btn" id="toggleSidebarBtn" title="展开/收起侧边栏">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h2 class="app-title">久刹</h2>
        </div>
        <div class="header-right">
          <div id="userInfo" style="display:flex;align-items:center;gap:8px;margin-right:15px;">
            <img id="userAvatar" class="user-avatar" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--border);cursor:pointer;" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2364b4ff' width='100' height='100' rx='50'/><text y='60' x='50' text-anchor='middle' font-size='40' fill='%23fff'>久</text></svg>">
            <span class="user-name" id="userName" style="cursor:pointer;"></span>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none;">
          <button class="icon-btn" id="themeBtn" title="主题">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- 视图切换 -->
      <nav class="view-tabs">
        <button class="view-tab active" data-view="diary">记录</button>
        <button class="view-tab" data-view="calendar">日历</button>
        <button class="view-tab" data-view="anniversary">纪念日</button>
      </nav>

      <!-- 记录视图 -->
      <main class="diary-view view-enter" id="diaryView">
        <div class="diary-header" style="display:flex;justify-content:space-between;align-items:center;">
          <select id="collectionFilter" style="padding:8px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:inherit;">
            <option value="" style="color:#000;">全部记录</option>
          </select>
          <div style="display:flex;gap:8px;">
            <button class="icon-btn" id="collectionsBtn" title="合集">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
            <button class="write-btn" id="writeBtn">+</button>
            <button class="icon-btn" id="batchSelectBtn">
              批量
            </button>
          </div>
        </div>
        <div id="batchActions" class="hidden" style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:10px;">
          <input type="checkbox" id="selectAllDiary" style="cursor:pointer;">
          <span style="font-size:13px;color:var(--text-secondary);">全选</span>
          <button class="write-btn" id="deleteSelectedBtn" style="padding:8px 12px;background:rgba(255,100,100,0.15);border:1px solid rgba(255,100,100,0.4);color:#ff6b6b;border-radius:6px;" title="删除选中">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </div>
        <div class="diary-list" id="diaryList"></div>
      </main>

      <!-- 日历视图 -->
      <section class="calendar-view hidden view-enter" id="calendarView">
        <div class="calendar-container" id="calendar"></div>
      </section>

      <!-- 纪念日视图 -->
      <section class="anniversary-view hidden view-enter" id="anniversaryView">
        <div class="anniversary-header">
          <h2>纪念日</h2>
          <button class="icon-btn" id="addAnniversaryBtn" title="添加纪念日">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
        <div class="anniversary-list" id="anniversaryList"></div>
      </section>

      <!-- 底部状态栏：时间和天气 -->
      <div class="status-bar" id="statusBar">
        <div class="greeting-section" id="greetingSection"></div>
        <div class="weather-section" id="weatherSection">
          <span class="weather-icon" id="weatherIcon"></span>
          <span class="weather-temp" id="weatherTemp"></span>
          <span class="weather-tip" id="weatherTip"></span>
        </div>
      </div>
      <!-- 天气效果画布 -->
      <canvas id="weatherCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
    </div>

    <!-- 写记录弹窗 -->
    <div class="modal hidden" id="writeModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="writeModalTitle">写记录</h3>
          <button class="modal-close" id="closeWriteModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form class="write-form" id="writeForm">
          <input type="hidden" id="diaryId" value="">
          <div class="form-row">
            <label for="diaryTitle" class="sr-only">记录标题</label>
            <input type="text" id="diaryTitle" placeholder="记录标题（选填）">
          </div>
          <label for="diaryContent" class="sr-only">记录内容</label>
          <textarea id="diaryContent" placeholder="今天发生了什么..." required></textarea>
          <div class="form-row">
            <label>心情</label>
            <div id="moodSelect" style="display:flex;gap:18px;font-size:26px;cursor:pointer;user-select:none;padding:5px 0;">
              <span class="mood-option" data-mood="🤩" title="极度高兴">🤩</span>
              <span class="mood-option" data-mood="😊" title="开心">😊</span>
              <span class="mood-option" data-mood="😐" title="平淡">😐</span>
              <span class="mood-option" data-mood="😔" title="低落">😔</span>
              <span class="mood-option" data-mood="😭" title="伤心">😭</span>
            </div>
          </div>
          <div class="form-row">
            <label>标签 <button type="button" id="manageTagsBtn" style="margin-left:8px;padding:4px 10px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);font-size:11px;cursor:pointer;">管理</button></label>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
              <div id="tagOptions" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
              <button type="button" id="addTagBtn" style="padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:15px;color:var(--text-secondary);font-size:12px;cursor:pointer;">+ 新标签</button>
            </div>
          </div>
          <div class="form-row">
            <label>日期和时间</label>
            <div style="display:flex;gap:10px;">
              <label for="diaryDate" class="sr-only">日期</label>
              <input type="date" id="diaryDate" required>
              <label for="diaryTime" class="sr-only">时间</label>
              <input type="time" id="diaryTime">
            </div>
          </div>
          <div class="form-row">
            <label for="diaryCollection">合集</label>
            <select id="diaryCollection">
              <option value="">无</option>
            </select>
          </div>
          <div class="form-row">
            <label>可见性</label>
            <select id="diaryVisibility">
              <option value="public">所有人可见</option>
              <option value="shared">仅链接对象可见</option>
              <option value="private">仅自己可见</option>
            </select>
          </div>
          <div class="form-row">
            <label><input type="checkbox" id="coAuthorCheck"> 共建记录</label>
            <div id="coAuthorsHint" style="font-size:12px;color:var(--text-muted);margin-top:5px;display:none;">选择参与共建的好友（可多选）</div>
            <div id="coAuthorsList" style="display:none;flex-direction:column;gap:8px;max-height:150px;overflow-y:auto;"></div>
          </div>
          <div class="form-row hidden" id="shareSelectRow">
            <label>分享给</label>
            <div class="share-list" id="shareList"></div>
          </div>
          <div class="form-row">
            <label>上传图片</label>
            <input type="file" id="diaryImage" accept="image/*" multiple>
          </div>
          <div id="imagePreview" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;"></div>
          <div class="form-row">
            <label>上传音频 / 录音</label>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
              <input type="file" id="diaryAudio" accept="audio/*" style="flex:1;">
              <button type="button" id="recordAudioBtn" style="padding:8px 16px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:13px;cursor:pointer;">🎤 录音</button>
            </div>
            <div id="audioPreview" style="margin-top:10px;"></div>
            <div id="recordingStatus" style="margin-top:8px;font-size:12px;color:var(--accent);display:none;"></div>
          </div>
          <button type="submit" class="submit-btn" id="submitDiaryBtn">保存</button>
        </form>
      </div>
    </div>

    <!-- 标签管理弹窗 -->
    <div class="modal hidden" id="tagModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>管理标签</h3>
          <button class="modal-close" id="closeTagModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tagManagementList" style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;"></div>
        <button type="button" id="addTagBtnModal" style="width:100%;padding:12px;background:var(--accent-light);border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-size:14px;cursor:pointer;">+ 添加标签</button>
      </div>
    </div>

    <!-- 通用输入弹窗 -->
    <div class="modal hidden" id="inputModal" style="z-index:2000;">
      <div class="modal-backdrop"></div>
      <div class="modal-content" style="max-width:360px;z-index:2001;">
        <div class="modal-header">
          <h3 id="inputModalTitle">输入</h3>
          <button class="modal-close" id="closeInputModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div style="padding:5px 0;">
          <input type="text" id="inputModalInput" style="width:100%;padding:12px 14px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:14px;font-family:inherit;box-sizing:border-box;">
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button id="inputModalCancel" style="padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;">取消</button>
          <button id="inputModalConfirm" style="padding:8px 16px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;">确认</button>
        </div>
      </div>
    </div>

    <!-- 合集管理弹窗 -->
    <div class="modal hidden" id="collectionModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>合集</h3>
          <button class="modal-close" id="closeCollectionModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="collectionList" class="collection-list"></div>
        <div class="collection-form">
          <input type="text" id="newCollectionName" placeholder="新合集名称">
          <button type="button" id="addCollectionBtn">添加</button>
        </div>
      </div>
    </div>

    <!-- 头像裁剪弹窗 -->
    <div class="modal hidden" id="cropModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">
          <h3>裁剪头像</h3>
          <button class="modal-close" id="closeCropModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="cropContainer" style="display:flex;justify-content:center;align-items:center;margin:20px 0;">
          <canvas id="cropCanvas" style="max-width:100%;max-height:300px;"></canvas>
        </div>
        <div style="text-align:center;">
          <button id="confirmCropBtn" style="padding:10px 30px;background:var(--accent-light);border:1px solid var(--accent);border-radius:8px;color:var(--accent);cursor:pointer;">确认</button>
        </div>
      </div>
    </div>

    <!-- 链接管理弹窗 -->
    <div class="modal hidden" id="linkModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>链接管理</h3>
          <button class="modal-close" id="closeLinkModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="link-section">
          <h4>我的专属码</h4>
          <p class="link-hint">分享给你的专属码，让别人输入来连接你</p>
          <div class="my-code-display" id="myCodeDisplay">
            <span id="myLinkCode" style="font-size:24px;font-weight:bold;letter-spacing:4px;color:var(--accent);"></span>
            <button class="copy-btn" id="copyCodeBtn">复制</button>
          </div>
        </div>
        <div class="link-section">
          <h4>添加连接</h4>
          <p class="link-hint">输入对方的专属码进行连接</p>
          <div class="code-input-row">
            <label for="friendCodeInput" class="sr-only">专属码</label>
            <input type="text" id="friendCodeInput" placeholder="输入专属码" maxlength="6" style="text-transform:uppercase;">
            <button class="create-link-btn" id="connectByCodeBtn">连接</button>
          </div>
          <div class="connect-result hidden" id="connectResult"></div>
        </div>
        <div class="link-section">
          <h4>已连接的人</h4>
          <div class="linked-users" id="linkedUsers"></div>
        </div>
      </div>
    </div>

    <!-- 记录详情弹窗 -->
    <div class="modal hidden" id="diaryModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content diary-detail">
        <button class="modal-close" id="closeDiaryModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="diary-detail-content" id="diaryDetailContent"></div>
        <div class="diary-comments" id="diaryComments">
          <div class="comments-header">评论</div>
          <div class="comments-list" id="commentsList"></div>
          <div class="comment-form">
            <label for="commentInput" class="sr-only">写评论</label>
            <input type="text" id="commentInput" placeholder="写评论...">
            <button id="sendCommentBtn">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 主题选择弹窗 -->
  <div class="modal hidden" id="themeModal">
    <div class="modal-backdrop"></div>
    <div class="modal-content" style="max-width:400px;">
      <div class="modal-header">
        <h3>选择主题</h3>
        <button class="modal-close" id="closeThemeModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <button class="theme-option" data-theme="default" style="padding:15px;border-radius:10px;border:2px solid rgba(100,180,255,0.3);background:linear-gradient(135deg,#0a0a12,#1a2a3a);cursor:pointer;transition:all 0.2s;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#64b4ff,#5a9ec4);margin:0 auto 8px;"></div>
          <div style="color:rgba(255,255,255,0.8);font-size:12px;">深空蓝</div>
        </button>
        <button class="theme-option" data-theme="light" style="padding:15px;border-radius:10px;border:2px solid rgba(0,0,0,0.15);background:linear-gradient(135deg,#f8fafc,#e8eef3);cursor:pointer;transition:all 0.2s;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#606060,#808080);margin:0 auto 8px;"></div>
          <div style="color:rgba(30,40,50,0.85);font-size:12px;">极简白</div>
        </button>
        <button class="theme-option" data-theme="gold" style="padding:15px;border-radius:10px;border:2px solid rgba(255,215,0,0.4);background:linear-gradient(135deg,#0a0808,#1a1510);cursor:pointer;transition:all 0.2s;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d4af37,#ffd700);margin:0 auto 8px;"></div>
          <div style="color:rgba(255,248,235,0.85);font-size:12px;">黑金</div>
        </button>
        <button class="theme-option" data-theme="warm" style="padding:15px;border-radius:10px;border:2px solid rgba(255,150,175,0.35);background:linear-gradient(135deg,#ffe8ed,#ffd0dc);cursor:pointer;transition:all 0.2s;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#ff8faa,#ffb6c1);margin:0 auto 8px;"></div>
          <div style="color:rgba(80,40,50,0.85);font-size:12px;">马卡龙</div>
        </button>
        <button class="theme-option" data-theme="sky" style="padding:15px;border-radius:10px;border:2px solid rgba(93,173,226,0.35);background:linear-gradient(135deg,#e8f4fc,#d0e8f0);cursor:pointer;transition:all 0.2s;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#5DADE2,#87ceeb);margin:0 auto 8px;"></div>
          <div style="color:rgba(30,50,70,0.85);font-size:12px;">浅蓝</div>
        </button>
        <button class="theme-option" data-theme="green" style="padding:15px;border-radius:10px;border:2px solid rgba(80,200,120,0.35);background:linear-gradient(135deg,#e8fff0,#c8f0d8);cursor:pointer;transition:all 0.2s;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#52c97a,#7dd99a);margin:0 auto 8px;"></div>
          <div style="color:rgba(30,60,40,0.85);font-size:12px;">春和景明</div>
        </button>
      </div>
    </div>
  </div>

    <!-- 纪念日弹窗 -->
    <div class="modal hidden" id="anniversaryModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="anniversaryModalTitle">添加纪念日</h3>
          <button class="modal-close" id="closeAnniversaryModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <input type="hidden" id="anniversaryId">
        <div class="form-row">
          <label>图标标识</label>
          <div id="anniversaryIconSelect" style="display:flex;gap:15px;font-size:24px;cursor:pointer;user-select:none;margin-bottom:10px;">
            <span class="icon-option selected" data-icon="💝">💝</span>
            <span class="icon-option" data-icon="🎂">🎂</span>
            <span class="icon-option" data-icon="💼">💼</span>
            <span class="icon-option" data-icon="📚">📚</span>
            <span class="icon-option" data-icon="🎉">🎉</span>
            <span class="icon-option" data-icon="🌟">🌟</span>
          </div>
        </div>
        <div class="form-row">
          <label for="anniversaryTitle">纪念日名称</label>
          <input type="text" id="anniversaryTitle" placeholder="例如：在一起的第一天">
        </div>
        <div class="form-row">
          <label for="anniversaryDate">日期</label>
          <input type="date" id="anniversaryDate">
        </div>
        <div class="form-row">
          <label for="anniversaryCelebrationText">专属庆祝语（选填）</label>
          <input type="text" id="anniversaryCelebrationText" placeholder="全屏庆祝时的文案，留空则使用默认">
        </div>
        <div class="form-row">
          <label><input type="checkbox" id="anniversaryRepeating"> 每年重复</label>
        </div>
        <div class="form-row">
          <label>可见性</label>
          <select id="anniversaryVisibility">
            <option value="public">所有人可见</option>
            <option value="shared">仅链接对象可见</option>
            <option value="private">仅自己可见</option>
          </select>
        </div>
        <div class="form-row hidden" id="anniversaryShareSelectRow">
          <label>分享给</label>
          <div class="share-list" id="anniversaryShareList"></div>
        </div>
        <div class="form-row">
          <label><input type="checkbox" id="anniversaryCoAuthorCheck"> 共同纪念日</label>
          <div id="anniversaryCoAuthorsHint" style="font-size:12px;color:var(--text-muted);margin-top:5px;display:none;">选择共同庆祝的好友（可多选）</div>
          <div id="anniversaryCoAuthorsList" style="display:none;flex-direction:column;gap:8px;max-height:150px;overflow-y:auto;"></div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
          <button id="deleteAnniversaryBtn" class="hidden" style="padding:10px 16px;background:rgba(255,100,100,0.15);border:1px solid rgba(255,100,100,0.4);color:#ff6b6b;border-radius:6px;cursor:pointer;margin-right:auto;">删除</button>
          <button id="cancelAnniversaryBtn" style="padding:10px 16px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;">取消</button>
          <button id="saveAnniversaryBtn" style="padding:10px 16px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;">保存</button>
        </div>
      </div>
    </div>

    <!-- 纪念日详情弹窗 -->
    <div class="modal hidden" id="anniversaryDetailModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content" style="max-width:360px;text-align:center;position:relative;">
        <button class="modal-close" id="closeAnniversaryDetailModal" style="position:absolute;right:15px;top:15px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div id="anniversaryDetailContent" style="margin-top:10px;"></div>
        <div id="anniversaryDetailActions" style="margin-top:25px;display:flex;gap:10px;justify-content:center;"></div>
      </div>
    </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/diary.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/anniversary.js"></script>
  <script src="js/sensing.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
