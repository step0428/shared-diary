<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>久刹</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 加载页 -->
    <div class="loading" id="loading">
      <div class="loading-ring"></div>
    </div>

    <!-- 登录/注册页 -->
    <div class="auth-page" id="authPage">
      <div class="auth-box">
        <h1 class="auth-title">久刹</h1>
        <p class="auth-subtitle">记录在一起的每一天</p>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">登录</button>
          <button class="auth-tab" data-tab="register">注册</button>
        </div>
        <form class="auth-form" id="authForm">
          <input type="email" id="email" placeholder="邮箱" required>
          <input type="password" id="password" placeholder="密码" required>
          <input type="text" id="displayName" class="hidden" placeholder="昵称">
          <button type="submit" class="auth-btn">登录</button>
        </form>
        <p class="auth-error" id="authError"></p>
      </div>
    </div>

    <!-- 主应用 -->
    <div class="main-app hidden" id="mainApp">
      <!-- 顶部导航 -->
      <header class="header">
        <div class="header-left">
          <h2 class="app-title">久刹</h2>
        </div>
        <div class="header-right">
          <span class="user-name" id="userName"></span>
          <button class="icon-btn" id="collectionsBtn" title="合集">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
          <button class="icon-btn" id="linkBtn" title="链接管理">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
          </button>
          <button class="icon-btn" id="logoutBtn" title="退出">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- 视图切换 -->
      <div class="view-tabs">
        <button class="view-tab active" data-view="diary">日记</button>
        <button class="view-tab" data-view="calendar">日历</button>
      </div>

      <!-- 日记视图 -->
      <div class="diary-view" id="diaryView">
        <div class="diary-header">
          <select id="collectionFilter" style="margin-right:auto;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.9);font-size:13px;font-family:inherit;">
            <option value="" style="color:#000;">全部日记</option>
          </select>
          <button class="write-btn" id="writeBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            写日记
          </button>
        </div>
        <div class="diary-list" id="diaryList"></div>
      </div>

      <!-- 日历视图 -->
      <div class="calendar-view hidden" id="calendarView">
        <div class="calendar-container" id="calendar"></div>
      </div>
    </div>

    <!-- 写日记弹窗 -->
    <div class="modal hidden" id="writeModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="writeModalTitle">写日记</h3>
          <button class="modal-close" id="closeWriteModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form class="write-form" id="writeForm">
          <input type="hidden" id="diaryId" value="">
          <input type="text" id="diaryTitle" placeholder="日记标题（选填）" style="width:100%;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.9);font-size:15px;font-family:inherit;margin-bottom:15px;">
          <textarea id="diaryContent" placeholder="今天发生了什么..." required></textarea>
          <div class="form-row">
            <label>标签 <button type="button" id="manageTagsBtn" style="margin-left:8px;padding:4px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:rgba(255,255,255,0.5);font-size:11px;cursor:pointer;">管理</button></label>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
              <div id="tagOptions" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
              <button type="button" id="addTagBtn" style="padding:6px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:15px;color:rgba(255,255,255,0.6);font-size:12px;cursor:pointer;">+ 新标签</button>
            </div>
          </div>
          <div class="form-row">
            <label>日期和时间</label>
            <div style="display:flex;gap:10px;">
              <input type="date" id="diaryDate" required>
              <input type="time" id="diaryTime" style="padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.9);font-size:14px;font-family:inherit;">
            </div>
          </div>
          <div class="form-row">
            <label>合集</label>
            <select id="diaryCollection" style="padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.9);font-size:14px;font-family:inherit;width:100%;">
              <option value="">无</option>
            </select>
          </div>
          <div class="form-row">
            <label>可见性</label>
            <select id="diaryVisibility">
              <option value="private">仅自己可见</option>
              <option value="shared">仅分享对象可见</option>
              <option value="public">所有人可见</option>
            </select>
          </div>
          <div class="form-row hidden" id="shareSelectRow">
            <label>分享给</label>
            <div class="share-list" id="shareList"></div>
          </div>
          <div class="form-row">
            <label>上传图片</label>
            <input type="file" id="diaryImage" accept="image/*">
          </div>
          <button type="submit" class="submit-btn">保存</button>
        </form>
      </div>
    </div>

    <!-- 标签管理弹窗 -->
    <div class="modal hidden" id="tagModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>管理标签</h3>
          <button class="modal-close" id="closeTagModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tagManagementList" style="display:flex;flex-direction:column;gap:12px;margin-bottom:20px;"></div>
        <button type="button" id="addTagBtnModal" style="width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;">+ 添加标签</button>
      </div>
    </div>

    <!-- 合集管理弹窗 -->
    <div class="modal hidden" id="collectionModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>合集</h3>
          <button class="modal-close" id="closeCollectionModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="collectionList" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;"></div>
        <div style="display:flex;gap:10px;">
          <input type="text" id="newCollectionName" placeholder="新合集名称" style="flex:1;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.9);font-size:14px;font-family:inherit;">
          <button type="button" id="addCollectionBtn" style="padding:12px 20px;background:rgba(126,184,218,0.2);border:1px solid rgba(126,184,218,0.4);border-radius:8px;color:rgba(255,255,255,0.9);font-size:14px;cursor:pointer;">添加</button>
        </div>
      </div>
    </div>

    <!-- 链接管理弹窗 -->
    <div class="modal hidden" id="linkModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>链接管理</h3>
          <button class="modal-close" id="closeLinkModal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="link-section">
          <h4>创建链接</h4>
          <p class="link-hint">生成一个链接，发送给想要连接的人</p>
          <button class="create-link-btn" id="createLinkBtn">生成链接</button>
          <div class="link-result hidden" id="linkResult">
            <input type="text" id="generatedLink" readonly>
            <button class="copy-btn" id="copyLinkBtn">复制</button>
          </div>
        </div>
        <div class="link-section">
          <h4>收到的链接</h4>
          <div class="pending-links" id="pendingLinks"></div>
        </div>
        <div class="link-section">
          <h4>已连接的人</h4>
          <div class="linked-users" id="linkedUsers"></div>
        </div>
      </div>
    </div>

    <!-- 日记详情弹窗 -->
    <div class="modal hidden" id="diaryModal">
      <div class="modal-backdrop"></div>
      <div class="modal-content diary-detail">
        <button class="modal-close" id="closeDiaryModal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="diary-detail-content" id="diaryDetailContent"></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/diary.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
